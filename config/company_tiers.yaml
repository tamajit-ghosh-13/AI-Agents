# =============================================================================
# Company Tiers — Evidence-Weighted Classification Map
# =============================================================================
# PHILOSOPHY
# Tiers are PRIORS, not verdicts. A "service" candidate with strong ownership
# evidence (metrics, "I built/owned/shipped" language, scoped impact) should
# outrank a "product" candidate who only lists responsibilities. This file
# supplies the prior; the Refiner stage (Stage 3) supplies the evidence check
# that can move a candidate up or down within that prior.
#
# Use `tier_weights` as a soft multiplier on the company-pedigree component
# of the score — never as a hard filter. Use `evidence_required_tiers` to
# decide which candidates get sent through stricter evidence extraction
# before their score is finalized.
#
# MATCHING NOTES (no code, just rules to implement)
# - Normalize before matching: lowercase, strip Ltd./Pvt./Inc./Limited,
#   strip "India"/"Global Technology Center" suffixes used by GCCs.
# - Check `aliases` map first, then fall back to substring containment
#   against the canonical names below — company names in raw resumes are
#   inconsistent ("TCS" vs "Tata Consultancy Services" vs "Tata Consultancy
#   Services Ltd").
# - A company not found anywhere in this file falls into `unclassified`,
#   which carries a NEUTRAL weight — absence of recognition is not evidence
#   of low quality, and unknown companies (especially small/regional firms,
#   non-Indian/non-US firms, or new startups) should never be penalized by
#   default.
# - `domain_tags` is a SEPARATE, additive dimension from tier — a company
#   can sit in exactly one tier but carry multiple domain tags (e.g. Stripe
#   is `product_tier3_growth` AND tagged `fintech`). Domain tags feed the
#   skill-relevance scorer (Stage 2), not the pedigree prior.
# =============================================================================

tier_weights:
  product_tier1: 1.00 # Mega-cap tech, world-class eng bar
  ai_native: 1.00 # AI-first companies — core-business AI experience
  product_tier2: 0.95
  semiconductor_hardware: 0.95
  product_tier3_growth: 0.90
  saas_b2b: 0.90
  gcc_captive: 0.85 # Real eng work, but variable by team/mandate
  gaming: 0.85
  strategy_consulting: 0.80 # Strong pedigree, ownership signal varies
  big4_professional_services: 0.75
  it_services_tier1: 0.70 # Large-scale IT services — needs evidence
  it_services_tier2: 0.65
  staffing_outsourcing: 0.55 # Pure body-shop / agency placement
  unclassified: 0.75 # Neutral — never penalize what we don't recognize

evidence_required_tiers:
  - it_services_tier1
  - it_services_tier2
  - staffing_outsourcing
  - big4_professional_services
  - strategy_consulting
  - gcc_captive

