# -----------------------------------------------------------------------------
# unclassified — implicit catch-all. No list needed: any company not found
# in a tier or alias above is scored at the `unclassified` weight (0.75,
# strictly neutral — neither rewarded nor penalized for pedigree).
#
# DATASET NOTE — read this before wiring the matcher:
# The 100K pool's single largest employer-name cluster is NOT a real
# company at all. These eight fictional/pop-culture placeholder names
# account for ~23,400–23,720 mentions EACH (by far the most common
# employers in the entire pool — more common than TCS or Infosys):
#   Pied Piper, Initech, Wayne Enterprises, Acme Corp, Stark Industries,
#   Hooli, Globex Inc, Dunder Mifflin
# These are almost certainly the generic filler employer used across the
# ~70K candidates with off-domain titles (Business Analyst, HR Manager,
# Mechanical Engineer, Accountant, Project Manager, Customer Support,
# Operations Manager, Content Writer, Sales Executive, Civil Engineer,
# Graphic Designer, Marketing Manager — each ~5,500–5,800 candidates).
# They correctly fall through to `unclassified` (neutral 0.75) under this
# file's existing matching rules — do NOT add them to any tier, and do
# NOT let a fuzzy/substring matcher try to map "Stark Industries" to a
# real-world tier. Their presence is a deliberate sign that company name
# alone is a weak signal for ~70% of this pool; title and career_history
# description carry far more weight than employer pedigree for the bulk
# of these candidates, since the employer name itself was never meant to
# be informative for them.
# -----------------------------------------------------------------------------
